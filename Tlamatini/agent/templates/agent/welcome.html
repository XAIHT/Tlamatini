{% load static %}  
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Welcome - Tlamatini</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="{% static 'agent/css/welcome.css' %}?v={{ STATIC_VERSION }}">
    <style>
    </style>
</head>
<body>
    <div class="container">
        <div class="row welcome-container">
            <div class="col-md-8 col-lg-6">
                <div class="card welcome-card">
                    <div class="card-body">
                        <h2 class="card-title mb-4 big-white-text">Welcome, {{ user.username }}!</h2>
                        <p class="card-text white-text">You have successfully logged in.</p>
                        <a href="{% url 'agent_page' %}" class="btn btn-primary mx-2 big-white-text-button">Go to Chat</a>
                        <a href="{% url 'logout' %}" class="btn btn-secondary mx-2 big-white-text-button">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
