{% load static %}  
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Tlamatini</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="{% static 'agent/css/login.css' %}?v={{ STATIC_VERSION }}">
</head>
<body>
    <div class="container">
        <div class="row login-container">
            <div class="col-md-6 col-lg-4">
                <div class="card login-card">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4 big-white-text">Tlamatini Login</h2>
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label white-text">Username</label>
                                <input type="text" name="username" class="form-control" placeholder="Enter your username" required id="id_username">
                            </div>
                            <div class="mb-3">
                                <label for="id_password" class="form-label white-text">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter your password" required id="id_password">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary big-white-text-button">Login</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
