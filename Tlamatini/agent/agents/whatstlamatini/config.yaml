# WhatsTlamatini — pure WhatsApp-Cloud-API bridge to the full Tlamatini chat
# (Multi-Turn + Exec Report). Mirror of TeleTlamatini, swapping Telegram for
# Meta's WhatsApp Cloud API.
#
# Inbound: Meta posts incoming WhatsApp messages to this agent's webhook
#          listener (see `whatsapp.webhook_*` below). Expose the listener
#          publicly via ngrok / cloudflared / a router port-forward and
#          register the resulting URL in Meta App → Webhooks (subscribe to
#          the `messages` field on the WABA app).
# Outbound: HTTP POST to the Graph API
#           https://graph.facebook.com/v20.0/<phone_number_id>/messages.

# ── Connection fields (auto-populated via canvas connections) ──────────────
source_agents: []
target_agents: []

# ── WhatsApp Cloud API credentials ─────────────────────────────────────────
# Get these from https://business.facebook.com → WhatsApp Manager → API Setup.
#   phone_number_id  — the WABA number's ID (NOT the phone number itself).
#   access_token     — system-user permanent access token.
#   verify_token     — any string of your choice; Meta echoes it back during
#                      webhook subscription so we can confirm we own the URL.
#
# webhook_host / webhook_port / webhook_path: where this agent listens for
# Meta's POSTed inbound messages. Expose this URL publicly and configure it
# in Meta App → Webhooks.
whatsapp:
  phone_number_id: <WHATSTLAMATINI_PHONE_NUMBER_ID goes here>
  access_token: <WHATSTLAMATINI_ACCESS_TOKEN goes here>
  verify_token: <WHATSTLAMATINI_VERIFY_TOKEN goes here>
  webhook_host: "0.0.0.0"
  webhook_port: 8765
  webhook_path: "/wa-webhook"
  graph_base: "https://graph.facebook.com"

# ── Access gate ────────────────────────────────────────────────────────────
# Single password the WhatsApp user must send on first contact. Leave empty
# to disable the gate (NOT recommended for a bot exposed to the public
# WhatsApp network).
password: <WHATSTLAMATINI_PASSWORD goes here>

# ── Tlamatini chat backend ─────────────────────────────────────────────────
# ws_url is auto-derived from base_url if omitted.
#
# ⚠️ EXECUTION-AUTHORITY MODEL (read this):
#   WhatsTlamatini is FULLY AUTHORIZED by design. The chat "Ask Execs" gate
#   (the per-tool Proceed/Deny prompt) is a BROWSER modal — a WhatsApp user
#   cannot answer it — so the bot intentionally does NOT expose it and
#   hard-pins `ask_execs_enabled: false` on every request. Consequently every
#   state-changing tool the LLM chooses (shell via Executer, Deleter, Kalier
#   offensive tooling, file writes, ...) runs UNATTENDED. Treat the `password`
#   below as full execution access to THIS machine — keep it strong and
#   private. (The WhatsApp number is reachable publicly; the password is the
#   only gate.)
#
# ⚠️ RUN THE BOT ON A DEDICATED TLAMATINI ACCOUNT (recommended):
#   The chat backend keys its WebSocket room group, its global request state,
#   AND the per-user Ask-Execs broker all by Tlamatini USER ID. If the bot
#   logs in with the SAME account a human uses in the browser, their requests
#   share that room/state. Give the bot its own `username`/`password` so the
#   two never collide.
#
# The three feature flags below mirror the chat toolbar checkboxes
# (Multi-Turn, Exec Report, ACPX). Each WhatsApp message WhatsTlamatini
# forwards to Tlamatini carries these flags verbatim, so a WhatsApp user gets
# exactly the same operational surface as a browser user. `acpx_enabled: true`
# exposes the 12 ACPX/Skill tools (acp_doctor / acp_spawn / acp_send_and_wait /
# acp_relay / acp_kill / list_skills / invoke_skill / ...) so the LLM can spawn
# external coding-agent CLIs and run the complete ACPX scheme from a WhatsApp
# message — full parity with TeleTlamatini.
tlamatini:
  base_url: "http://127.0.0.1:8000"
  username: <TLAMATINI_USERNAME goes here>
  password: <TLAMATINI_PASSWORD goes here>
  multi_turn_enabled: true
  exec_report_enabled: true
  acpx_enabled: true
  total_timeout: 1800              # hard ceiling for one request (seconds)
  response_idle_timeout: 8         # WS-silence after first frame to call it done

# ── OPTIONAL: LLM-aided clarification gate (off by default) ────────────────
# When enabled, every WhatsApp message is first sent to a local Ollama model
# that decides whether the request is "complete enough" to forward to
# Tlamatini, and if not, asks a follow-up question. Adds 2-30 s of latency
# per message. Leave disabled for OpenClaw-style fire-and-go behavior.
completeness_check:
  enabled: false
  host: "http://localhost:11434"
  model: "llama3"
  instruction: |
    You are an intent-completeness classifier. Decide whether the user's last
    message (combined with prior conversation if any) expresses a clear and
    complete actionable request that Tlamatini could begin working on right
    now. Respond ONLY with a single JSON object: {"complete": true|false,
    "ask": "<question to ask the user if not complete, else empty>"}.
