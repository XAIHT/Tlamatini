# Whatsapper Agent — the ONE WhatsApp send/receive agent (official Meta Cloud API only)
# How to get the keys: see HOW_TO_GET_YOUR_WHATSAPP_ASSETS.md (Meta/Facebook, no third party).

# ── Run mode ──────────────────────────────────────────────────────────────────
# auto    → SEND if `message` or `template` is set, otherwise RECEIVE.
# send    → (i)  send the message/template, start target_agents, die.
# receive → (ii/iii) run the official webhook listener up to rx_max_seconds, then
#           start target_agents and die — reporting the received text (iii) or
#           "no message" (ii). Both are readable by Parametrizer.
mode: "auto"

# ── Identity: which number SENDS ─────────────────────────────────────────────
# provider: auto | cloud | web   (plain words ok: "me"/"personal" = web, "bot"/"business" = cloud)
#   cloud → official Meta Cloud API; sends from the BUSINESS number (System User /
#           templates / 24h-window rules apply).
#   web   → UNOFFICIAL WhatsApp Web automation; sends from YOUR OWN personal number
#           after a one-time QR login (no templates, no System User). For your own
#           messages only — it is not a Meta-sanctioned API.
#   auto  → cloud (unchanged default).
provider: "auto"

# ── Meta WhatsApp Cloud API credentials ──────────────────────────────────────
# Normally seeded from config.json globals (whatsapp_phone_number_id /
# whatsapp_access_token) or env (WHATSAPP_PHONE_NUMBER_ID / WHATSAPP_ACCESS_TOKEN).
whatsapp:
  phone_number_id: <WHATSAPP_PHONE_NUMBER_ID goes here>
  access_token: <WHATSAPP_ACCESS_TOKEN goes here>              # secret
  graph_base: "https://graph.facebook.com"
  api_version: "v20.0"
  to: ""                        # default recipient number (country code + number)
  # RECEIVE webhook (Meta POSTs inbound here — expose it publicly + set it in
  # Meta → WhatsApp → Configuration with this same verify_token):
  verify_token: "tlamatini"
  webhook_host: "0.0.0.0"
  webhook_port: 8086
  webhook_path: "/wa-webhook"
  # ── WhatsApp Web (personal "as me") — ONLY used when provider=web ──
  web:
    headless: false            # FIRST run MUST be headed so you can scan the QR code
    login_wait_seconds: 120    # how long to wait for the chat / QR login to complete
    settle_seconds: 8          # pause after Send so the message flushes before closing
    profile_dir: ""            # blank = a managed per-install login profile (remembered)

# ── SEND ──────────────────────────────────────────────────────────────────────
message: ""                     # free-form text (delivers only inside the 24h window)
contact_name: ""                # or a person's name from contacts.json (→ their whatsapp number)
# Cold-start (outside 24h) needs an APPROVED template:
template: ""                    # e.g. hello_world
template_language: "en_US"
template_params: []             # body {{1}},{{2}}… values (YAML list, or "a||b")

# ── RECEIVE ───────────────────────────────────────────────────────────────────
rx_max_seconds: 60
rx_from: ""                     # optional: only accept messages from this number
rx_match: ""                    # optional: only accept a message containing this text

# ── Wiring ────────────────────────────────────────────────────────────────────
source_agents: []
target_agents: []

poll_interval: 2
recursion_limit: 1000
