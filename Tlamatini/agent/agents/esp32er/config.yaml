# ESP32er Agent Configuration
#
# ESP32er is Tlamatini's bridge to **PlatformIO Core** (https://platformio.org) —
# the open-source embedded build system + toolchain manager whose `pio` / `platformio`
# CLI covers build, upload, serial monitor, debug, the board database, the package
# manager and static analysis. Unlike STM32er (which drives a separate MCP server),
# PlatformIO already SHIPS a complete CLI, so ESP32er invokes `pio` subcommands
# DIRECTLY and captures their stdout/stderr into an INI_SECTION_ESP32ER block, then
# ALWAYS triggers downstream agents (success OR failure).
#
# It is fully self-contained (stdlib only: subprocess + urllib + json + threading)
# exactly like Kalier / ACPXer, so it runs identically in source and frozen builds
# and never imports from agent.* — the agent pool runs as standalone subprocesses.
#
# ZERO-CONFIG: leave pio_executable blank with auto_bootstrap: true and ESP32er
# DOWNLOADS PlatformIO Core itself (the official get-platformio.py installer, with a
# `pip install platformio` fallback) into a per-user PLATFORMIO_CORE_DIR on first use
# — the end user installs only the board USB driver + Tlamatini.

# ── action — which PlatformIO capability to invoke (one per run):
#   Environment / meta:
#     bootstrap        : download + install PlatformIO Core, validate, report (no build)
#     validate         : full environment preflight report (no build/upload)
#     system_info      : pio system info
#     boards           : pio boards <boards_query|board> --json-output  (board search)
#   Project lifecycle:
#     create_project   : pio project init -d <project_dir> -b <board>  (+ optional framework)
#     write_source     : write/overwrite a file under the project  (rel_path, content)
#     read_source      : read a file back from the project  (rel_path)
#     list_sources     : list source files under the project
#     clean            : pio run -t clean
#   Build & flash:
#     build            : pio run            (compile + link -> .elf/.bin)
#     upload           : pio run -t upload  (flash over USB-serial bootloader — esptool)
#     build_and_upload : pio run -t upload  (build is implicit)
#     scaffold_build_upload : ONE-CALL LIFECYCLE COMPOSITE (fastest path) — create_project
#                        (if no platformio.ini) -> write_source (when `content` set; default
#                        rel_path src/main.cpp) -> build -> upload (only if a board is
#                        connected, else built-OK/upload-skipped) -> monitor (if monitor_seconds>0).
#                        Replaces the 4-call create/write/build/upload chain in ONE run.
#     list_artifacts   : paths to firmware.* under .pio/build/<env>/
#   Observe (HIL):
#     device_list      : pio device list --json-output  (enumerate serial ports)
#     monitor          : bounded `pio device monitor` for `monitor_seconds`, then stop
#     monitor_session  : upload -> monitor for `monitor_seconds` (composite, one run)
#   Packages / QA:
#     pkg_install      : pio pkg install -l <pkg_spec>   (add a library)
#     pkg_list         : pio pkg list
#     pkg_update       : pio pkg update
#     check            : pio check  (static analysis — cppcheck / clang-tidy)
#     test             : pio test   (unit tests on target / native)
action: "validate"

# ── PlatformIO install / resolution ──────────────────────────────────────
# pio_executable — absolute path to an existing `pio` (or `platformio`) binary.
# LEAVE BLANK for the zero-config experience: ESP32er resolves `pio` from the
# bootstrapped per-user install, then PATH, then `python -m platformio`. Auto-
# injected from config.json `pio_executable` on the chat path when non-empty.
pio_executable: ""
# auto_bootstrap — install PlatformIO Core automatically when `pio` is not found.
auto_bootstrap: true
# pio_install_method — "script" (official get-platformio.py installer → an isolated
# penv under pio_core_dir) or "pip" (pip install platformio into the agent's Python).
pio_install_method: "script"
# pio_core_dir — PLATFORMIO_CORE_DIR (holds penv + downloaded toolchains/frameworks).
# Empty = %LOCALAPPDATA%/Tlamatini/platformio on Windows (~/.local/share/... elsewhere)
# — a per-user, writable location that works for both source and frozen installs.
pio_core_dir: ""
# auto_update — refresh PlatformIO (pio upgrade / pip -U) each run when already present.
auto_update: false
# pip_install — allow the `pip install platformio` fallback when the script install fails.
pip_install: true

# ── Safety preflight (fail-safe gate) ─────────────────────────────────────
# preflight — before building/uploading, validate the environment and REFUSE when
# correctness cannot be guaranteed. Compile actions require `pio` + a platformio.ini;
# upload/monitor actions ALSO require a connected serial port (ESP32 flashes over its
# onboard USB-serial bootloader — no external JTAG probe needed). Leave true.
preflight: true

# ── Project / build params ────────────────────────────────────────────────
project_dir: ""        # PlatformIO project root (folder holding platformio.ini)
board: "esp32dev"      # create_project / preflight: PlatformIO board id (e.g. esp32dev,
                       #   esp32-s3-devkitc-1, esp32-c3-devkitm-1). See action='boards'.
framework: ""          # create_project: "arduino" | "espidf" ('' = the board's default)
environment: ""        # build/upload/...: platformio.ini [env:NAME] to target ('' = default/all)
rel_path: ""           # write_source/read_source: path under the project, e.g. "src/main.cpp"
content: ""            # write_source: full file contents
command_timeout: 900   # seconds for a single `pio` run (the FIRST build downloads the
                       #   espressif32 platform + toolchain — that build can be slow)

# ── Upload / serial monitor (HIL) ─────────────────────────────────────────
port: ""               # upload/monitor: serial port (e.g. "COM5"); '' = PlatformIO auto-detect
baud: 115200           # monitor: serial baud rate
monitor_seconds: 10    # monitor / monitor_session: how long to drain serial before stopping

# ── Boards / packages ─────────────────────────────────────────────────────
boards_query: ""       # boards: search filter ('' = the `board` value, else "espressif32")
pkg_spec: ""           # pkg_install: a library spec, e.g. "bblanchon/ArduinoJson@^7"

# ── Connection fields ────────────────────────────────────────────────────
source_agents: []      # upstream agents (canvas connection tracking)
target_agents: []      # downstream agents to start after the run (ALWAYS triggered)
