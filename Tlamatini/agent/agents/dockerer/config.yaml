# Dockerer Agent Configuration
# Manages Docker containers and docker-compose operations.

# Docker command to execute
# Options: build, up, down, restart, stop, start, exec, logs, ps, pull, custom
command: "ps"

# Path to docker-compose file (used with compose commands)
compose_file: ""

# Service name (used with compose commands targeting a specific service)
service_name: ""

# Container name (used with direct docker commands)
container_name: ""

# Build context path (used with build command)
build_context: "."

# Dockerfile path (used with build command, relative to build_context)
dockerfile: ""

# Image name/tag (used with build command)
image_tag: ""

# Extra arguments to pass to the docker/docker-compose command
extra_args: ""

# Custom raw docker command (used when command is "custom")
custom_command: ""

# Agents to start after execution (auto-populated via canvas)
target_agents: []

# Source agents (auto-populated via canvas connections)
source_agents: []
