mode: auto
telegram:
  # provider: auto | bot | user  (pick which IDENTITY sends the message)
  #   bot  -> send AS the bot (Bot API). Plain words: "bot", "as the bot".
  #   user -> send AS your own logged-in account (user session). Plain words:
  #           "me", "myself", "personal", "my account", "as me".
  #   auto -> Bot API for numeric ids/channels; your account for private
  #           @usernames/+phone when api_id/api_hash/session are configured.
  # Keep contacts/configs readable with @username; auto uses the local username
  # cache + official Bot API lookup first, then the official Telegram user
  # session for private @usernames that bots cannot cold-DM.
  provider: auto
  bot_token: <TELEGRAM_BOT_TOKEN goes here>
  chat_id: '@blackangy'
  api_id: <TELETLAMATINI_API_ID goes here>
  api_hash: <TELETLAMATINI_API_HASH goes here>
  session_name: telegrammer_user_session
  session_string: <TELEGRAM_SESSION_STRING goes here>
message: ''
contact_name: ''
rx_max_seconds: 60
rx_from_chat_id: ''
rx_match: ''
source_agents: []
target_agents: []
poll_interval: 2
recursion_limit: 1000
