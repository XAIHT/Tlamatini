# Pythonxer Agent Configuration
# This is a deterministic agent (no LLM) that executes a Python script.
#
# BEHAVIOR:
# When executed, this agent will:
# 1. Validate the script with Ruff (lint warnings are logged, not blocking)
# 2. Run the Python script
# 3. If exit code == 0 (True): trigger all downstream agents
# 4. If exit code != 0 (False): skip downstream agents
#
# The script is written to a temp file and executed via subprocess.
# Use sys.exit(0) for True, sys.exit(1) for False, or let the script
# end naturally (exit code 0 = True).

# Python script to execute (user provides this via the config dialog)
# Examples:
#   import os
#   print(os.path.exists("C:\\myfile.txt"))
#   sys.exit(0 if os.path.exists("C:\\myfile.txt") else 1)
script: "import sys\nprint('Hello from Pythonxer!')\nsys.exit(0)"

# Execute in a forked window
# When true, the script is executed in a new console window so that
# stdout and stderr are visible in real time. The agent still waits
# for the script to finish and evaluates the exit code as usual.
execute_forked_window: false

# Agents triggered after execution (auto-populated via canvas connections)
source_agents: []
target_agents: []
