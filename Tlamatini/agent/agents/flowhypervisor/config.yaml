# FlowHypervisor Agent Configuration
# LLM-powered flow monitoring agent that watches all running agents

# LLM connection settings
llm:
  host: "http://127.0.0.1:11434"
  model: "gpt-oss:120b-cloud"
  temperature: 0.0

# Monitoring poll interval (seconds)
monitoring_poll_time: 10

# User instructions — additional directives appended to the monitoring prompt.
# Use this to fine-tune supervision: add domain-specific rules, dismiss known
# false positives, emphasize specific agents, adjust sensitivity, etc.
# Leave empty for default behavior.
user_instructions: ""
