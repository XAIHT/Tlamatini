# Kalier Agent Configuration
#
# Kalier is Tlamatini's bridge to the **MCP-Kali-Server** (https://www.kali.org/tools/mcp-kali-server/).
# That project ships TWO halves:
#   1. server.py  — a Flask HTTP API that runs ON the Kali Linux box and exposes
#                   /api/command + /api/tools/<tool> + /health endpoints.
#   2. client.py  — an MCP (FastMCP) stdio bridge that simply forwards to that API.
# Kalier talks DIRECTLY to half #1 (the Flask API) over HTTP using only the
# Python stdlib (urllib) — exactly like the Apirer agent — so it runs identically
# in source and frozen builds and never needs the `requests`/`mcp` packages inside
# the agent-pool subprocess. Point `server_url` at the running API server (use an
# SSH tunnel `ssh -L 5000:localhost:5000 user@KALI_IP` for a remote Kali box, as
# the upstream README recommends).
#
# ⚠️  Authorized use only. Run Kalier ONLY against systems you own or are
#     explicitly authorized to test (pentest engagement, CTF, lab). The agent is
#     a thin transport — the operator is responsible for scope and legality.

# action — which Kali capability to invoke. One of:
#   command      : run an ARBITRARY shell command on the Kali box (POST /api/command)
#   nmap         : Nmap port/service scan          (target, scan_type, ports, additional_args)
#   gobuster     : Gobuster dir/dns/fuzz/vhost      (url, mode, wordlist, additional_args)
#   dirb         : Dirb web content scan            (url, wordlist, additional_args)
#   nikto        : Nikto web-server scan            (target, additional_args)
#   sqlmap       : SQLmap SQL-injection scan        (url, data, additional_args)
#   metasploit   : Run a Metasploit module          (module, options)
#   hydra        : Hydra credential attack          (target, service, username[_file], password[_file], additional_args)
#   john         : John the Ripper hash crack       (hash_file, wordlist, format, additional_args)
#   wpscan       : WPScan WordPress scan            (url, additional_args)
#   enum4linux   : enum4linux SMB/Samba enumeration (target, additional_args)
#   health       : probe the API server health      (no params; GET /health)
action: "nmap"

# server_url — base URL of the running MCP-Kali-Server Flask API (server.py).
# Default is the localhost binding the server uses; for a remote Kali box tunnel
# the port and keep this as 127.0.0.1.
#
# NOTE (chat / Multi-Turn path): when the LLM launches Kalier via the wrapped
# `chat_agent_kalier` tool, Tlamatini auto-injects the global `kali_server_url`
# from config.json (Config -> URLs in the navbar) over this value — so the user
# configures the Kali box ONCE and never repeats it in prompts. This canvas
# default still applies to .flw / canvas runs; set it in the node's dialog there.
server_url: "http://127.0.0.1:5000"

# timeout — legacy seconds-to-wait for the API HTTP response. SUPERSEDED by
# OOB_shift_reaper below (Kalier now waits up to OOB_shift_reaper for the Kali box to
# answer); kept only for backward compatibility with old .flw files.
timeout: 300

# ── OOB_shift_reaper (Angela's design, 2026-07-19) ──────────────────────────
# Nmapper, Discoverer and Kalier are the THREE GODS. Kalier's tool actually runs on the
# REMOTE Kali box (via MCP-Kali-Server), so Kalier cannot stream/kill it — instead the
# HTTP wait for the box to answer runs FREE up to `OOB_shift_reaper` seconds before
# giving up, so a long, legitimate remote scan is NEVER cut off merely for being slow.
#   1. WORKING (box still answering)     -> waits FREE up to the OOB_shift_reaper window.
#   2/3. If the box never answers within the window, the HTTP wait finally gives up
#        (the remote tool itself is bounded server-side and returns partial results).
# NAMU (Tier-3, the god of gods) OVERRIDES this: when the Tlamatini process shuts down
# (Ctrl+C / SIGINT / SIGBREAK / exit), every Nmapper / Discoverer / Kalier child is
# hunted down and killed IMMEDIATELY -- no matter how long it has run.
OOB_shift_reaper: 3600        # seconds Kalier waits FREE for the remote Kali box to answer
hang_detect_idle_seconds: 120 # reserved for parity with Nmapper/Discoverer (remote runs can't be streamed)

# ── Shared params (used by several actions) ──────────────────────────────
# target          — IP / hostname  (nmap, nikto, hydra, enum4linux)
# url             — target URL      (gobuster, dirb, sqlmap, wpscan)
# additional_args — extra raw CLI flags appended to the tool invocation
target: ""
url: ""
additional_args: ""

# ── command (action=command) — arbitrary shell command on the Kali box ──
command: ""

# ── nmap (action=nmap) ───────────────────────────────────────────────────
scan_type: "-sCV"      # nmap scan flags (e.g. -sV, -sS, -sCV, -A)
ports: ""              # comma list / range, e.g. "22,80,443" or "1-1000" (empty = nmap default)

# ── gobuster (action=gobuster) ───────────────────────────────────────────
mode: "dir"            # dir | dns | fuzz | vhost
wordlist: "/usr/share/wordlists/dirb/common.txt"   # also used by dirb; for john prefer rockyou.txt

# ── sqlmap (action=sqlmap) ───────────────────────────────────────────────
data: ""               # POST data string (url-encoded), e.g. "id=1&submit=Go"

# ── metasploit (action=metasploit) ───────────────────────────────────────
module: ""             # e.g. "exploit/unix/ftp/vsftpd_234_backdoor"
options: {}            # MSF options as a mapping, e.g. {RHOSTS: 10.0.0.5, RPORT: 21}
                       # (the wrapped Multi-Turn tool may also pass this as a JSON string)

# ── hydra (action=hydra) ─────────────────────────────────────────────────
service: ""            # ssh | ftp | http-post-form | smb | rdp | ...
username: ""           # single username  (OR set username_file)
username_file: ""      # path to a username wordlist
password: ""           # single password  (OR set password_file)
password_file: ""      # path to a password wordlist, e.g. /usr/share/wordlists/rockyou.txt

# ── john (action=john) ───────────────────────────────────────────────────
hash_file: ""          # path to the file containing the hash(es) to crack
format: ""             # optional hash format hint, e.g. "raw-md5", "nt", "sha512crypt"

# Connection fields
source_agents: []      # upstream agents (canvas connection tracking)
target_agents: []      # downstream agents to start after the run (always triggered)
