# STM32er Agent Configuration
#
# STM32er is Tlamatini's bridge to the **STM32 Template Project MCP server**
# (https://github.com/XAIHT/STM32TemplateProjectMCP). That project ships a
# FastMCP **stdio** server (mcp/stm32_mcp_server.py) exposing 23 tools that
# scaffold -> author -> build -> flash -> observe STM32F4 firmware using the
# toolchain bundled inside STM32CubeIDE (no IDE GUI). STM32er spawns that server
# as a child process, performs the MCP initialize handshake over stdin/stdout,
# calls ONE capability (selected by `action`) via JSON-RPC `tools/call`, captures
# the result into an INI_SECTION_STM32ER block, then shuts the server down and
# ALWAYS triggers downstream agents (success OR failure).
#
# It is fully self-contained (stdlib only: subprocess + json + threading) exactly
# like Kalier / ACPXer, so it runs identically in source and frozen builds and
# never imports from agent.* — the agent pool runs as standalone subprocesses.
#
# ⚠️  The MCP server itself needs the `mcp` package (and `pyserial` for the
#     serial_* tools) installed in whatever Python runs it. If the agent's own
#     Python does not have `mcp`, point `mcp_python` at a Python that does
#     (e.g. the MCP project's .venv: .../STM32TemplateProjectMCP/mcp/.venv/Scripts/python.exe).

# ── action — which STM32 MCP capability to invoke. One of the 23 server tools:
#   Environment:
#     get_config              : resolved config + discovered toolchain paths + toolchain_ok
#     discover_toolchain_tool : locate gcc/make/cmake/ninja/programmer in a CubeIDE install
#   Project lifecycle:
#     create_project          : clone the template to <dest_parent>/<name>  (-> project_dir)
#     write_source            : write/overwrite a file under project/  (rel_path, content)
#     read_source             : read a file back from project/  (rel_path)
#     list_sources            : list all files under project/
#     clean                   : remove a project's build dir  (system)
#   Build & flash:
#     build                   : compile+link+objcopy -> .elf/.hex/.bin  (system, jobs, clean_first)
#     list_artifacts          : paths to the latest build outputs  (system)
#     flash                   : upload via STM32_Programmer_CLI (ST-LINK/SWD)  (system, binary)
#     build_and_flash         : build then flash in one call  (system, jobs)
#     erase                   : mass-erase the MCU flash
#     reset                   : hardware-reset the MCU
#   Serial / VCP (HIL):
#     serial_list_ports       : list COM ports; flags ST-LINK VCP ports (USB VID 0x0483)
#     serial_connect          : open a VCP/UART  (port, baud)
#     serial_send             : send a line, optionally read the reply  (port, data, ...)
#     serial_read             : read async board output  (port, timeout, max_bytes)
#     serial_disconnect       : close a serial connection  (port)
#   Live memory over SWD (HIL):
#     read_memory             : read live RAM/peripherals of a RUNNING target  (address|symbol, ...)
#     write_memory            : write live memory of a RUNNING target  (value, address|symbol, ...)
#     live_memory_start       : start a persistent OpenOCD stream  (variables, ...)  (-> session_id)
#     live_memory_read        : most-recent samples from a session  (session_id, last_n)
#     live_memory_stop        : stop the session, free the ST-LINK  (session_id)
#  PLUS two composite convenience actions that chain the *stateful* tools within a
#  single server lifetime (the in-process session would otherwise die when the
#  per-run server exits) so they are usable end-to-end in one canvas/chat run:
#     serial_session          : serial_connect -> serial_send|serial_read -> serial_disconnect
#     live_monitor            : live_memory_start -> stream `monitor_seconds` -> read -> live_memory_stop
action: "get_config"

# ── MCP server connection ────────────────────────────────────────────────
# server_script — absolute path to the STM32 MCP server (mcp/stm32_mcp_server.py).
# LEAVE BLANK for the zero-config experience: with `auto_bootstrap: true` (below),
# STM32er DOWNLOADS the STM32 Template Project MCP from its git repo, pip-installs
# its deps and validates the install on first use, then resolves this path to the
# bootstrapped copy automatically — the user only installs STM32CubeIDE + Tlamatini.
# Set it explicitly ONLY to point at an existing local checkout (an on-disk path
# given here wins and skips bootstrap). NOTE (chat / Multi-Turn path): the wrapped
# chat_agent_stm32er tool auto-injects the global `stm32_mcp_server_script` from
# config.json (Config -> URLs) over this value when that global is non-empty.
server_script: ""

# ── MCP auto-bootstrap (zero-config installer) ────────────────────────────
# When auto_bootstrap is true and no valid on-disk server_script is configured,
# STM32er clones (git, shallow) — or zip-downloads when git is absent — the MCP
# repo into mcp_install_dir, pip-installs mcp + pyserial, validates, then runs.
auto_bootstrap: true
# mcp_repo_url — the STM32 Template Project MCP git repository to install from.
mcp_repo_url: "https://github.com/XAIHT/STM32TemplateProjectMCP.git"
# mcp_ref — branch/tag to check out ('' = the repo's default branch).
mcp_ref: ""
# mcp_install_dir — where to clone the MCP ('' = %LOCALAPPDATA%/Tlamatini/
# STM32TemplateProjectMCP on Windows, ~/.local/share/... elsewhere — a per-user,
# writable location that works for both source and frozen 'Program Files' installs).
mcp_install_dir: ""
# auto_update — git pull the latest each run when the repo is already cloned
# (false = clone once, then reuse the cached copy; set true to always refresh).
auto_update: false
# pip_install — install the MCP server's Python deps (mcp, pyserial) if missing.
# Skipped automatically when they already import; set false to manage deps yourself.
pip_install: true

# ── Safety preflight (critical-mission fail-safe gate) ────────────────────
# preflight — before COMPILING or FLASHING, validate the environment and REFUSE
# the operation when correctness cannot be guaranteed (never silently produce or
# upload mis-targeted firmware). Compile actions require the arm-none-eabi-gcc
# toolchain + a build tool + a SUPPORTED device; hardware actions (flash/erase/
# reset/serial/SWD) ALSO require the STM32_Programmer_CLI, a working ST-LINK USB
# driver, AND a physically connected ST-LINK probe. Run action='validate' for a
# full report without building/flashing. Leave true for mission-critical use.
preflight: true
# device — the target STM32F part (e.g. "STM32F407VG"). Leave blank to use the
# MCP template's configured device. The preflight REFUSES a cross-family mismatch
# (e.g. asking for an STM32F0 part on an STM32F4 template) so a wrong linker
# script / startup file can never silently mis-target the firmware.
device: ""

# mcp_python — Python executable used to RUN the MCP server. Empty = reuse the
# agent's own Python. Set this when the agent's Python lacks the `mcp`/`pyserial`
# packages (e.g. point at the MCP project's virtualenv interpreter). Auto-injected
# from config.json `stm32_mcp_python` on the chat path when configured.
mcp_python: ""

# template_dir — STM32_TEMPLATE_DIR env passed to the server (the scaffold root
# holding stm32.config.json). Empty = let the server default to the parent of
# server_script. Auto-injected from config.json `stm32_template_dir` on chat.
template_dir: ""

# ide_root — STM32_IDE_ROOT env passed to the server (the STM32CubeIDE install
# root used for toolchain auto-discovery). Empty = let the server use its config /
# well-known default. Auto-injected from config.json `stm32_ide_root` on chat.
ide_root: ""

# startup_timeout — seconds to wait for the MCP initialize handshake to complete.
startup_timeout: 30
# call_timeout — seconds to wait for a single tool result. Builds and long Kali-
# style tool runs can take minutes; the server caps each subprocess at ~600s.
call_timeout: 600

# ── Project lifecycle params ─────────────────────────────────────────────
project_dir: ""        # project root returned by create_project (used by most tools)
name: ""               # create_project: new project folder name (e.g. "leg_controller")
dest_parent: ""        # create_project: directory that will contain the new project
overwrite: false       # create_project: replace an existing folder of the same name
rel_path: ""           # write_source/read_source: path under project/, e.g. "Core/Src/main.c"
content: ""            # write_source: full file contents
system: "make"         # build/flash/clean/list_artifacts/read_memory/...: "make" | "cmake"
jobs: 8                # build/build_and_flash: parallel make jobs
clean_first: false     # build: wipe the build dir before building
binary: "bin"          # flash: "bin" (uses flash.start_address) | "elf" | "hex"

# ── toolchain discovery ──────────────────────────────────────────────────
discover_ide_root: ""  # discover_toolchain_tool: explicit CubeIDE root ('' = auto-discover)

# ── serial / VCP (HIL) ───────────────────────────────────────────────────
port: ""               # serial_* / serial_session: COM port, e.g. "COM7"
baud: 0                # serial_connect: 0 = use stm32.config.json serial.baud (115200)
data: ""               # serial_send / serial_session: text line to send
read_response: true    # serial_send / serial_session: read the reply after sending
read_timeout: 2.0      # serial_send / serial_session: max seconds to wait for the reply
line_ending: ""        # serial_send / serial_session: "lf"|"cr"|"crlf"|"none" ('' = config default)
serial_timeout: 2.0    # serial_read / serial_session (read-only): seconds to read
max_bytes: 4096        # serial_read / serial_session: max bytes to read

# ── SWD live memory (one-shot read/write) ────────────────────────────────
address: ""            # read_memory/write_memory: hex location, e.g. "0x20000000"
symbol: ""             # read_memory/write_memory: ELF symbol name (needs the .elf)
elf: ""                # explicit .elf path (overrides project_dir lookup)
count: 1               # read_memory: number of width-bit units to read
width: 32              # read_memory/write_memory: 8 | 16 | 32 bits
value: ""              # write_memory: value to write (hex "0xFF" or decimal "255")

# ── SWD live memory (continuous streaming) ───────────────────────────────
# variables — JSON array spec for live_memory_start / live_monitor. Items may be a
# symbol-name string ("g_blink_count"), or a dict {"symbol": "temp", "type":"float"}
# or {"address": "0x20000000", "name": "x", "width": 32}.
variables: ""
interval_ms: 500       # live_memory_start/live_monitor: poll period (min 100)
output_path: ""        # live_memory_start/live_monitor: JSONL path ('' = temp dir)
session_id: ""         # live_memory_read/live_memory_stop: session id from live_memory_start
last_n: 10             # live_memory_read / live_monitor: most-recent samples to return
monitor_seconds: 5     # live_monitor composite: how long to stream before reading + stopping

# ── Connection fields ────────────────────────────────────────────────────
source_agents: []      # upstream agents (canvas connection tracking)
target_agents: []      # downstream agents to start after the run (ALWAYS triggered)
