name: Name Guard

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: name-guard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout all branches
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "name-guard-bot"
          git config user.email "name-guard-bot@users.noreply.github.com"

      - name: Scan, scrub, and push (per branch)
        id: scrub
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          FOUND_ANY=0
          AFFECTED_BRANCHES=""

          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | grep -v '^origin/HEAD$'); do
            branch="${ref#origin/}"
            echo "=== scanning $branch ==="
            git checkout -B "$branch" "$ref"

            # Only scan tracked files. Case-insensitive whole-word-ish match:
            # grep prints matches; fail-open on empty.
            if git grep -I -l -i -E '(^|[^A-Za-z])mike([^A-Za-z]|$)' -- . ':!.github/workflows/name-guard.yml' > /tmp/hits.txt 2>/dev/null; then
              if [ -s /tmp/hits.txt ]; then
                echo "--- hits on $branch ---"
                cat /tmp/hits.txt
                while IFS= read -r f; do
                  [ -z "$f" ] && continue
                  # Replace the three variants with angelahack1 equivalents.
                  # Use perl for portable, atomic, in-place edit.
                  perl -i -pe 's/\bMike\b/angelahack1/g;  s/\bMIKE\b/ANGELAHACK1/g;  s/\bmike\b/angelahack1/g' "$f"
                done < /tmp/hits.txt
                git add -A
                if ! git diff --cached --quiet; then
                  git commit -m "name-guard: auto-scrub disallowed name reference on $branch"
                  git push "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$branch"
                  FOUND_ANY=1
                  AFFECTED_BRANCHES="$AFFECTED_BRANCHES $branch"
                fi
              fi
            fi
          done

          echo "found_any=$FOUND_ANY" >> "$GITHUB_OUTPUT"
          echo "branches=$AFFECTED_BRANCHES" >> "$GITHUB_OUTPUT"

      - name: Open audit issue when scrub triggered
        if: steps.scrub.outputs.found_any == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const branches = `${{ steps.scrub.outputs.branches }}`.trim();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Name guard triggered — auto-scrubbed on: ${branches}`,
              body: [
                `The name-guard workflow detected a disallowed name reference and auto-scrubbed it.`,
                ``,
                `**Branches scrubbed:** \`${branches}\``,
                `**Workflow run:** ${runUrl}`,
                `**Trigger:** \`${context.eventName}\` on \`${context.ref}\``,
                ``,
                `No manual action is required — the commit that scrubbed the reference has already been pushed.`,
                `Review the run log if you want to see which files were affected.`,
              ].join('\n'),
              labels: ['name-guard', 'auto'],
            });
