# Telegramrx Agent Configuration
# Receives Telegram messages, logs them, and sends an acknowledgment reply.

# Source agents (auto-populated via canvas connections)
source_agents: []

# Target agents (reference only, not auto-started)
target_agents: []

# Telegram Configuration
telegram:
  api_id: <TELEGRAMRX_API_ID goes here>   # Replace with your actual api_id
  api_hash: <TELEGRAMRX_API_HASH goes here>     # Replace with your actual Telegram API Hash
  listen_chat: <TELEGRAMRX_LISTEN_CHAT goes here>  # Chat to listen on ("me" = Saved Messages)

# Whisper Configuration (for voice message transcription)
whisper:
  model: "medium"  # Options: tiny, base, small, medium, large

# Polling configuration
poll_interval: 5
