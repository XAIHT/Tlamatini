# Whatsapper Agent Configuration
#
# Sends WhatsApp messages via Meta's OFFICIAL WhatsApp Cloud API (Graph API) —
# the professional, enterprise backbone (the same one WhatsTlamatini uses). It
# can also (a) watch source agents and alert on log keywords, or (b) send one
# message right now ("send Ana a WhatsApp"). TextMeBot remains only as a legacy
# fallback (set provider: textmebot).

# ── Provider (auto-detected by default) ──────────────────────────────────────
# Leave BLANK and Whatsapper auto-detects from whatever you configured:
#   Meta creds present  → "meta"   (official, cheapest at scale)
#   Twilio creds present→ "twilio" (easiest setup, free 2-min sandbox)
#   only TextMeBot key  → "textmebot" (legacy unofficial gateway)
# Set it explicitly ("meta" / "twilio" / "textmebot") to force one.
provider: ""

# ── Meta WhatsApp Cloud API credentials ──────────────────────────────────────
# Get these from https://business.facebook.com → WhatsApp Manager → API Setup.
#   phone_number_id — the WABA sending number's ID (NOT the phone number itself).
#   access_token    — a system-user PERMANENT access token.
# These are normally seeded once from config.json globals (Config → URLs:
# whatsapp_phone_number_id / whatsapp_access_token) OR from the environment
# (WHATSAPP_PHONE_NUMBER_ID / WHATSAPP_ACCESS_TOKEN), so chat prompts never
# repeat them. Set them here only to override per-flow on the canvas.
whatsapp:
  phone_number_id: ""
  access_token: ""
  graph_base: "https://graph.facebook.com"
  api_version: "v20.0"
  # Default recipient for monitor-mode alerts when no contact_name is given
  # (country code + number; the leading + is stripped automatically).
  to: ""

# ── One-shot direct send (Contacts-aware) ─────────────────────────────────────
# When `message` (or `template`) is set AND there are NO source_agents to
# monitor, Whatsapper sends ONCE and exits. The recipient is, in priority order:
#   1) contact_name — a person's name from contacts.json (next to config.json),
#      resolved to that person's WhatsApp number (PREFERRED — "send Ana a WhatsApp").
#   2) to            — a literal number (country code + number).
# Leave message/template blank for the log-monitor mode below.
message: ""
contact_name: ""

# ── Template message (the ONLY way to start a COLD conversation) ──────────────
# WhatsApp policy: a free-form `message` is deliverable ONLY inside the 24-hour
# window after the recipient last messaged you. To message someone cold, send a
# pre-APPROVED template (created in Meta WhatsApp Manager). When `template` is
# set it takes precedence over `message`.
#   template          — the approved template name.
#   template_language — its language code (e.g. en_US, es_MX). Default en_US.
#   template_params   — list of {{1}},{{2}}… body values (YAML list, or "a||b").
template: ""
template_language: "en_US"
template_params: []

# ── Twilio (easiest WhatsApp; used when provider: twilio or auto-detected) ────
# Sign up at twilio.com → copy these 3 from the Console. No Meta app, no token
# dance. Free WhatsApp sandbox for testing. Normally seeded from config.json
# globals (twilio_account_sid / twilio_auth_token / twilio_whatsapp_from) or env
# (TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN / TWILIO_WHATSAPP_FROM).
twilio:
  account_sid: ""   # starts with AC...
  auth_token: ""    # secret
  from_number: ""   # your Twilio WhatsApp sender, e.g. +14155238886 (sandbox is fine)

# ── Legacy TextMeBot (only used when provider: textmebot) ─────────────────────
textmebot:
  phone: ""   # recipient phone with country code (e.g. +1234567890)
  apikey: ""  # TextMeBot API key (textmebot.com)

# ── Log-monitor mode (when source_agents are wired) ───────────────────────────
# Source agents to monitor (auto-populated via canvas connections)
source_agents: []
# Target agents (reference only, not auto-started — Whatsapper is terminal)
target_agents: []

# Keywords to detect (comma-separated string)
keywords: "error, critical, exception, fatal"

# System Prompt for LLM Analysis
system_prompt: |
  You are a Log Analysis Agent for WhatsApp notifications within the Tlamatini platform.
  Analyze the provided log entry.
  If it contains any of the target keywords ({keywords}), summarize the issue in a short message suitable for WhatsApp.
  
  Format:
  "🚨 Alert from {source_agent}: <Short Summary>"
  
  Keep it under 200 characters if possible.

# LLM Configuration
llm:
  base_url: "http://localhost:11434"
  model: "gpt-oss:120b-cloud"
  temperature: 0.1

# Polling configuration
poll_interval: 5
recursion_limit: 1000
